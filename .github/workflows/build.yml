name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      # dev-build (Runs only on main branch pushes)

      - name: Delete previous dev-build tag & release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete dev-build --yes --cleanup-tag || true
          git push origin :refs/tags/dev-build || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Git short SHA
        if: github.ref == 'refs/heads/main'
        id: git-version
        run: echo "id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create dev-build Pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: Dev-build ${{ steps.git-version.outputs.id }}
          files: build/libs/*.jar
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # versioned release (Runs only on tag pushes)

      - name: Check if tag is Pre-release
        if: startsWith(github.ref, 'refs/tags/')
        id: prerelease_check
        run: |
          if [[ "${{ github.ref }}" == *"-"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
