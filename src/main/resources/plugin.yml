name: SleepAnimation
version: '${version}'
main: io.github.derec4.sleepAnimation.SleepAnimation
api-version: '1.18'
prefix: DerexXD
authors: [ DerexXD ]
description:
  Simple: Adds an animation while the night is skipped by players sleeping, making things really more immersive!
website: https://github.com/DereC4

commands:
  sleepanimation:
    description: Main command for SleepAnimation
    usage: /<command> reload
    aliases: [ sa ]

permissions:
  SleepAnimation.reload:
    description: Allows reloading the SleepAnimation plugin
    default: op
